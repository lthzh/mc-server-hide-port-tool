name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dynamic var/secret lists
        id: lists
        env:
          DOMAINS: ${{ secrets.DOMAINS }}
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          # 解析 CLOUDFLARE_DOMAINS_API_TOKEN，输出多行 wrangler secret 名 + JSON 值文件
          out="$(python scripts/parse_domain_tokens.py "$CLOUDFLARE_DOMAINS_API_TOKEN" --domains "$DOMAINS")"
          secret_names="$(printf '%s' "$out" | sed -n '1p')"
          values_json="$(printf '%s' "$out" | sed -n '2p')"
          printf '%s' "$values_json" > /tmp/domain_tokens.json
          {
            echo "vars<<LIST_EOF"
            [ -n "${DOMAINS:-}" ] && echo "DOMAINS"
            [ -n "${BETTER_AUTH_URL:-}" ] && echo "BETTER_AUTH_URL"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "secrets<<LIST_EOF"
            [ -n "${BETTER_AUTH_SECRET:-}" ] && echo "BETTER_AUTH_SECRET"
            [ -n "${GITHUB_CLIENT_ID:-}" ] && echo "GITHUB_CLIENT_ID"
            [ -n "${GITHUB_CLIENT_SECRET:-}" ] && echo "GITHUB_CLIENT_SECRET"
            echo "$secret_names"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "domain_tokens_json=/tmp/domain_tokens.json" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker (vars + secrets + migrations)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAINS: ${{ secrets.DOMAINS }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          DOMAIN_TOKENS_JSON: ${{ steps.lists.outputs.domain_tokens_json }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply hide-port-tool-db --remote
          command: deploy --minify
          postCommands: |
            # 把每个根域名 token 用 wrangler secret put 注入 worker（值来自动态生成的 JSON）
            python scripts/put_domain_secrets.py "$DOMAIN_TOKENS_JSON"
          vars: ${{ steps.lists.outputs.vars }}
          secrets: ${{ steps.lists.outputs.secrets }}

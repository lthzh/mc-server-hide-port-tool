name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

# 防止同一分支并发部署冲突
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 探测每个 GitHub secret 是否被设置；只把已配置的放进 wrangler-action 的 vars/secrets 名单。
      # 未配置 GitHub OAuth 时自动跳过 GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET，
      # 进而 wrangler deploy 时 worker 侧不再有这两个 secret → 后台选 GitHub 注册方式会自动跳过。
      - name: Build dynamic secret/var lists
        id: lists
        env:
          DOMAINS: ${{ secrets.DOMAINS }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN_EXAMPLE1_COM: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE1_COM }}
          CLOUDFLARE_API_TOKEN_EXAMPLE2_COM: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE2_COM }}
        run: |
          set -euo pipefail
          {
            echo "vars<<LIST_EOF"
            [ -n "${DOMAINS:-}" ] && echo "DOMAINS"
            [ -n "${BETTER_AUTH_URL:-}" ] && echo "BETTER_AUTH_URL"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "secrets<<LIST_EOF"
            [ -n "${BETTER_AUTH_SECRET:-}" ] && echo "BETTER_AUTH_SECRET"
            [ -n "${GITHUB_CLIENT_ID:-}" ] && echo "GITHUB_CLIENT_ID"
            [ -n "${GITHUB_CLIENT_SECRET:-}" ] && echo "GITHUB_CLIENT_SECRET"
            # 每个根域名 token 是否设置都单独判断；只有设置了的才注入
            [ -n "${CLOUDFLARE_API_TOKEN_EXAMPLE1_COM:-}" ] && echo "example1_com_CLOUDFLARE_API_TOKEN"
            [ -n "${CLOUDFLARE_API_TOKEN_EXAMPLE2_COM:-}" ] && echo "example2_com_CLOUDFLARE_API_TOKEN"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"

      # 一次性部署：D1 写回 + custom domain patch + 应用迁移 + deploy + 注入 secrets/vars
      # .dev.vars.example 里的键名 → GitHub env 名映射规则：
      #   *_CLOUDFLARE_API_TOKEN   ->  CLOUDFLARE_API_TOKEN_<域名大写>（避免数字开头）
      #   DOMAINS / BETTER_AUTH_URL -> 同名大写
      # secrets 与 vars 字段每行只写「变量名」，对应的值通过该 step 的 env: 提供。
      - name: Deploy Worker (vars + secrets + migrations)
        uses: cloudflare/wrangler-action@v3
        env:
          # ---- Cloudflare 部署凭据（wrangler 用）----
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ---- vars（明文，注入为 Worker 普通环境变量）----
          DOMAINS: ${{ secrets.DOMAINS }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          # ---- secrets（敏感，注入为 Worker 加密环境变量）----
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          # 业务变量名映射（wrangler-action 按名字取本 step 的 env）
          example1_com_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE1_COM }}
          example2_com_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_EXAMPLE2_COM }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 先写回 d1 的 database_id（若不存在则远端创建），再 patch custom domain routes，
          # 再远端应用迁移，最后部署（部署会一并创建 custom domain）
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply hide-port-tool-db --remote
          command: deploy --minify
          # vars / secrets 列表由上一步动态生成：只有 GitHub 仓库里已配置的同名 secret 才会出现
          vars: ${{ steps.lists.outputs.vars }}
          secrets: ${{ steps.lists.outputs.secrets }}

name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dynamic var/secret lists
        id: lists
        env:
          # CLOUDFLARE_DOMAINS_API_TOKEN 同时承担两件事：
          #   1) 解析出每个根域名的 Cloudflare API Token，注入为 worker secret
          #   2) 解析出域名清单，覆盖到 worker 的 DOMAINS 普通环境变量
          # 仓库可能不再单独设置 DOMAINS secret；若设置了，仅作为一致性校验参考。
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          DOMAINS_HINT: ${{ secrets.DOMAINS }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          set -euo pipefail
          # 解析 CLOUDFLARE_DOMAINS_API_TOKEN：line1 名单、line2 JSON 值、line3 域名数组
          out="$(python scripts/parse_domain_tokens.py "$CLOUDFLARE_DOMAINS_API_TOKEN" --domains "$DOMAINS_HINT")"
          secret_names="$(printf '%s' "$out" | sed -n '1p')"
          values_json="$(printf '%s' "$out" | sed -n '2p')"
          domains_json="$(printf '%s' "$out" | sed -n '3p')"
          printf '%s' "$values_json" > /tmp/domain_tokens.json
          # 用解析得到的域名数组覆盖 DOMAINS
          echo "domains=$domains_json" >> "$GITHUB_OUTPUT"
          {
            echo "vars<<LIST_EOF"
            echo "DOMAINS"
            [ -n "${BETTER_AUTH_URL:-}" ] && echo "BETTER_AUTH_URL"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "secrets<<LIST_EOF"
            [ -n "${BETTER_AUTH_SECRET:-}" ] && echo "BETTER_AUTH_SECRET"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          # 根域名 token 不走 wrangler-action 的 secrets 字段（其名可能以数字开头，
          # 不能直接作 env 名），而由 postCommands 中的 wrangler secret put 显式注入。
          # secret_names 仅用于日志展示。
          echo "domain_secret_names=$secret_names" >> "$GITHUB_OUTPUT"
          echo "domain_tokens_json=/tmp/domain_tokens.json" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker (vars + secrets + migrations)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # DOMAINS 用上一步从 CLOUDFLARE_DOMAINS_API_TOKEN 解析出的域名数组覆盖
          DOMAINS: ${{ steps.lists.outputs.domains }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DOMAIN_TOKENS_JSON: ${{ steps.lists.outputs.domain_tokens_json }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply mc-server-hide-port-tool-db --remote
          command: deploy --minify
          postCommands: |
            # 把每个根域名 token 用 wrangler secret put 注入 worker（值来自动态生成的 JSON）
            python scripts/put_domain_secrets.py "$DOMAIN_TOKENS_JSON"
          vars: ${{ steps.lists.outputs.vars }}
          secrets: ${{ steps.lists.outputs.secrets }}

name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Validate required inputs and Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_DOMAINS_API_TOKEN BETTER_AUTH_URL BETTER_AUTH_SECRET DATA_ENCRYPTION_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            fi
          done
          node --input-type=module <<'NODE'
          const response = await fetch('https://api.cloudflare.com/client/v4/user/tokens/verify', {
            headers: { Authorization: `Bearer ${process.env.CLOUDFLARE_API_TOKEN}` },
            signal: AbortSignal.timeout(10_000)
          })
          const payload = await response.json().catch(() => null)
          if (!response.ok || !payload?.success || payload.result?.status !== 'active') {
            console.error('CLOUDFLARE_API_TOKEN is invalid or inactive')
            process.exit(1)
          }
          console.log('CLOUDFLARE_API_TOKEN is active')
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build deployment var and secret lists
        id: lists
        env:
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          DATA_ENCRYPTION_KEY_PREVIOUS: ${{ secrets.DATA_ENCRYPTION_KEY_PREVIOUS }}
        run: |
          set -euo pipefail
          out="$(python scripts/parse_domain_tokens.py "$CLOUDFLARE_DOMAINS_API_TOKEN")"
          domains_json="$(printf '%s' "$out" | sed -n '3p')"
          echo "domains=$domains_json" >> "$GITHUB_OUTPUT"
          {
            echo "vars<<LIST_EOF"
            echo "DOMAINS"
            echo "BETTER_AUTH_URL"
            echo "OAUTH_ALLOWED_HOSTS"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "secrets<<LIST_EOF"
            echo "BETTER_AUTH_SECRET"
            echo "DATA_ENCRYPTION_KEY"
            if [ -n "${DATA_ENCRYPTION_KEY_PREVIOUS:-}" ]; then
              echo "DATA_ENCRYPTION_KEY_PREVIOUS"
            fi
            echo "CLOUDFLARE_DOMAINS_API_TOKEN"
            echo "LIST_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Worker (vars, secrets, and migrations)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAINS: ${{ steps.lists.outputs.domains }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_ENCRYPTION_KEY_PREVIOUS: ${{ secrets.DATA_ENCRYPTION_KEY_PREVIOUS }}
          CLOUDFLARE_DOMAINS_API_TOKEN: ${{ secrets.CLOUDFLARE_DOMAINS_API_TOKEN }}
          OAUTH_ALLOWED_HOSTS: ${{ vars.OAUTH_ALLOWED_HOSTS }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            node scripts/ensure-d1-and-writeback.cjs
            node scripts/patch-custom-domain.cjs
            npx wrangler d1 migrations apply mc-server-hide-port-tool-db --remote
          command: deploy --minify
          vars: ${{ steps.lists.outputs.vars }}
          secrets: ${{ steps.lists.outputs.secrets }}
